  <rect x="60" y="420" width="230" height="160" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <rect x="60" y="420" width="230" height="26" rx="6" fill="#85B7EB"/>
  <rect x="60" y="432" width="230" height="14" fill="#85B7EB"/>
  <text x="175" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#042C53">Pedido</text>
  <line x1="60" y1="454" x2="290" y2="454" stroke="#185FA5" stroke-width="0.5"/>
  <text x="68" y="470" dominant-baseline="central" font-size="12" fill="#0C447C">- idPedido: int</text>
  <text x="68" y="486" dominant-baseline="central" font-size="12" fill="#0C447C">- estado: String</text>
  <text x="68" y="502" dominant-baseline="central" font-size="12" fill="#0C447C">- fechaHora: Date</text>
  <text x="68" y="518" dominant-baseline="central" font-size="12" fill="#0C447C">- productos: List&lt;Producto&gt;</text>
  <text x="68" y="534" dominant-baseline="central" font-size="12" fill="#0C447C">- tiempoEstimado: int</text>
  <line x1="60" y1="546" x2="290" y2="546" stroke="#185FA5" stroke-width="0.5"/>
  <text x="68" y="562" dominant-baseline="central" font-size="12" fill="#0C447C">+ calcularTotal(): double</text>
  <text x="68" y="578" dominant-baseline="central" font-size="12" fill="#0C447C">+ actualizarEstado(): void</text>

  <!-- Flecha Pedido -> Producto -->
  <path d="M290 500 L360 500" fill="none" stroke="#888" stroke-width="1" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
  <text x="300" y="490" dominant-baseline="central" font-size="11" fill="#555">contiene</text>

  <!-- PRODUCTO -->
  <rect x="360" y="420" width="210" height="150" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <rect x="360" y="420" width="210" height="26" rx="6" fill="#97C459"/>
  <rect x="360" y="432" width="210" height="14" fill="#97C459"/>
  <text x="465" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#173404">Producto</text>
  <line x1="360" y1="454" x2="570" y2="454" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="368" y="470" dominant-baseline="central" font-size="12" fill="#27500A">- idProducto: int</text>
  <text x="368" y="486" dominant-baseline="central" font-size="12" fill="#27500A">- nombre: String</text>
  <text x="368" y="502" dominant-baseline="central" font-size="12" fill="#27500A">- precio: double</text>
  <text x="368" y="518" dominant-baseline="central" font-size="12" fill="#27500A">- descripcion: String</text>
  <text x="368" y="534" dominant-baseline="central" font-size="12" fill="#27500A">- disponible: boolean</text>
  <line x1="360" y1="546" x2="570" y2="546" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="368" y="562" dominant-baseline="central" font-size="12" fill="#27500A">+ getDetalles(): String</text>

  <!-- Flecha Pedido -> Pago -->
  <path d="M175 580 L175 640" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="183" y="612" dominant-baseline="central" font-size="11" fill="#555">genera</text>

  <!-- PAGO -->
  <rect x="60" y="640" width="230" height="150" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <rect x="60" y="640" width="230" height="26" rx="6" fill="#EF9F27"/>
  <rect x="60" y="652" width="230" height="14" fill="#EF9F27"/>
  <text x="175" y="662" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#412402">Pago</text>
  <line x1="60" y1="674" x2="290" y2="674" stroke="#854F0B" stroke-width="0.5"/>
  <text x="68" y="690" dominant-baseline="central" font-size="12" fill="#633806">- idPago: int</text>
  <text x="68" y="706" dominant-baseline="central" font-size="12" fill="#633806">- monto: double</text>
  <text x="68" y="722" dominant-baseline="central" font-size="12" fill="#633806">- metodoPago: String</text>
  <text x="68" y="738" dominant-baseline="central" font-size="12" fill="#633806">- estado: String</text>
  <text x="68" y="754" dominant-baseline="central" font-size="12" fill="#633806">- fecha: Date</text>
  <line x1="60" y1="766" x2="290" y2="766" stroke="#854F0B" stroke-width="0.5"/>
  <text x="68" y="782" dominant-baseline="central" font-size="12" fill="#633806">+ procesarPago(): boolean</text>

  <!-- MENU -->
  <rect x="360" y="640" width="220" height="140" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <rect x="360" y="640" width="220" height="26" rx="6" fill="#B4B2A9"/>
  <rect x="360" y="652" width="220" height="14" fill="#B4B2A9"/>
  <text x="470" y="662" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#2C2C2A">Menu</text>
  <line x1="360" y1="674" x2="580" y2="674" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="368" y="690" dominant-baseline="central" font-size="12" fill="#444441">- idMenu: int</text>
  <text x="368" y="706" dominant-baseline="central" font-size="12" fill="#444441">- productos: List&lt;Producto&gt;</text>
  <line x1="360" y1="718" x2="580" y2="718" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="368" y="734" dominant-baseline="central" font-size="12" fill="#444441">+ mostrarProductos(): void</text>
  <text x="368" y="750" dominant-baseline="central" font-size="12" fill="#444441">+ buscarProducto(): Producto</text>
  <text x="368" y="766" dominant-baseline="central" font-size="12" fill="#444441">+ agregarProducto(): void</text>

  <!-- Flecha Menu -> Producto -->
  <path d="M465 640 L465 570" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- LEYENDA -->
  <rect x="60" y="840" width="560" height="60" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="80" y="862" dominant-baseline="central" font-size="12" fill="#555">Leyenda:</text>
  <line x1="140" y1="862" x2="175" y2="862" stroke="#888" stroke-width="1" marker-end="url(#arrow-empty)"/>
  <text x="180" y="862" dominant-baseline="central" font-size="12" fill="#555">Herencia</text>
  <line x1="265" y1="862" x2="300" y2="862" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="305" y="862" dominant-baseline="central" font-size="12" fill="#555">Asociación</text>
  <line x1="400" y1="862" x2="435" y2="862" stroke="#888" stroke-width="1" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
  <text x="440" y="862" dominant-baseline="central" font-size="12" fill="#555">Composición</text>
  <text x="80" y="885" dominant-baseline="central" font-size="11" fill="#888">Sistema de Gestión de Pedidos para Restaurante — Java POO</text>
</svg>
