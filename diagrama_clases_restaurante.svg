<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-empty" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10Z" fill="white" stroke="#888" stroke-width="1.2"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 10" refX="0" refY="5" markerWidth="10" markerHeight="8" orient="auto">
      <path d="M7 1L13 5L7 9L1 5Z" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- USUARIO (abstracta) -->
  <rect x="230" y="30" width="220" height="120" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <rect x="230" y="30" width="220" height="26" rx="6" fill="#AFA9EC"/>
  <rect x="230" y="42" width="220" height="14" fill="#AFA9EC"/>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#26215C">«abstract» Usuario</text>
  <line x1="230" y1="56" x2="450" y2="56" stroke="#534AB7" stroke-width="0.5"/>
  <text x="238" y="72" dominant-baseline="central" font-size="12" fill="#3C3489">- id: int</text>
  <text x="238" y="88" dominant-baseline="central" font-size="12" fill="#3C3489">- nombre: String</text>
  <text x="238" y="104" dominant-baseline="central" font-size="12" fill="#3C3489">- correo: String</text>
  <text x="238" y="120" dominant-baseline="central" font-size="12" fill="#3C3489">- contrasena: String</text>
  <line x1="230" y1="132" x2="450" y2="132" stroke="#534AB7" stroke-width="0.5"/>
  <text x="238" y="143" dominant-baseline="central" font-size="12" fill="#3C3489">+ iniciarSesion(): boolean</text>

  <!-- Herencia Cliente -> Usuario -->
  <path d="M200 180 L200 150 L230 150" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow-empty)"/>

  <!-- Herencia Administrador -> Usuario -->
  <path d="M480 180 L480 150 L450 150" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow-empty)"/>

  <!-- CLIENTE -->
  <rect x="60" y="180" width="200" height="130" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <rect x="60" y="180" width="200" height="26" rx="6" fill="#5DCAA5"/>
  <rect x="60" y="192" width="200" height="14" fill="#5DCAA5"/>
  <text x="160" y="202" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#04342C">Cliente</text>
  <line x1="60" y1="214" x2="260" y2="214" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="68" y="230" dominant-baseline="central" font-size="12" fill="#085041">- historialPedidos: List</text>
  <text x="68" y="246" dominant-baseline="central" font-size="12" fill="#085041">- mesa: int</text>
  <line x1="60" y1="258" x2="260" y2="258" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="68" y="272" dominant-baseline="central" font-size="12" fill="#085041">+ realizarPedido(): Pedido</text>
  <text x="68" y="288" dominant-baseline="central" font-size="12" fill="#085041">+ consultarEstado(): String</text>
  <text x="68" y="302" dominant-baseline="central" font-size="12" fill="#085041">+ realizarPago(): Pago</text>

  <!-- ADMINISTRADOR -->
  <rect x="420" y="180" width="210" height="130" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <rect x="420" y="180" width="210" height="26" rx="6" fill="#F0997B"/>
  <rect x="420" y="192" width="210" height="14" fill="#F0997B"/>
  <text x="525" y="202" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="bold" fill="#4A1B0C">Administrador</text>
  <line x1="420" y1="214" x2="630" y2="214" stroke="#993C1D" stroke-width="0.5"/>
  <text x="428" y="230" dominant-baseline="central" font-size="12" fill="#712B13">- nivel: String</text>
  <line x1="420" y1="242" x2="630" y2="242" stroke="#993C1D" stroke-width="0.5"/>
  <text x="428" y="258" dominant-baseline="central" font-size="12" fill="#712B13">+ agregarProducto(): void</text>
  <text x="428" y="274" dominant-baseline="central" font-size="12" fill="#712B13">+ editarProducto(): void</text>
  <text x="428" y="290" dominant-baseline="central" font-size="12" fill="#712B13">+ verPedidos(): List</text>
  <text x="428" y="306" dominant-baseline="central" font-size="12" fill="#712B13">+ supervisarPagos(): void</text>

  <!-- Flecha Cliente -> Pedido -->
  <path d="M160 310 L160 420" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="168" y="370" dominant-baseline="central" font-size="11" fill="#555">crea</text>

